<header class="site-header">
  <div class="header-inner">
    <a href="{{ "/" | relURL }}" class="logo">
      <span class="logo-icon">🏰</span>
      <span class="logo-text">Cardboard<br><small>Castle Club</small></span>
    </a>
    <button class="menu-toggle" aria-label="Toggle menu" onclick="document.body.classList.toggle('nav-open')">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
